name: Build

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Changelog'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      iosevka_tag: ${{ steps.check.outputs.iosevka_tag }}
      iosevka_version: ${{ steps.check.outputs.iosevka_version }}
      iosevka_base_version: ${{ steps.check.outputs.iosevka_base_version }}
    steps:
      - uses: actions/checkout@v6

      - id: check
        run: |
          IOSEVKA_TAG=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/be5invis/Iosevka/releases/latest | jq -r .tag_name)
          IOSEVKA_VERSION="${IOSEVKA_TAG#v}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LAST_SUFFIX=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases" | \
              jq -r "[.[].tag_name | select(startswith(\"v${IOSEVKA_VERSION}-\")) | ltrimstr(\"v${IOSEVKA_VERSION}-\") | tonumber] | max // 0")
            SUFFIX=$((LAST_SUFFIX + 1))
            FULL_VERSION="${IOSEVKA_VERSION}-${SUFFIX}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "iosevka_base_version=${IOSEVKA_VERSION}" >> "$GITHUB_OUTPUT"
            echo "iosevka_version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
            echo "iosevka_tag=v${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "iosevka_tag=${IOSEVKA_TAG}" >> "$GITHUB_OUTPUT"
            echo "iosevka_version=${IOSEVKA_VERSION}" >> "$GITHUB_OUTPUT"
            echo "iosevka_base_version=${IOSEVKA_VERSION}" >> "$GITHUB_OUTPUT"
            if curl -fsSL -o /dev/null \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${IOSEVKA_TAG}"; then
              echo "${IOSEVKA_TAG} already released, skipping"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      font_name: ${{ steps.resolve.outputs.font_name }}
      iosevka_version: ${{ needs.check.outputs.iosevka_version }}
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - id: resolve
        run: |
          REPO="${{ github.repository }}"
          IMG="${REGISTRY}/${REPO,,}:${{ needs.check.outputs.iosevka_version }}"
          echo "image=${IMG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMG}" >> "$GITHUB_ENV"
          FONT_NAME=$(grep -oP '^\[buildPlans\.\K[^]]+' private-build-plans.toml | head -1)
          echo "font_name=${FONT_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: IOSEVKA_VERSION=${{ needs.check.outputs.iosevka_base_version }}
          tags: ${{ env.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  patch:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and patch
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          FONT_NAME: ${{ needs.build.outputs.font_name }}
          OUTPUT_DIR: ${{ github.workspace }}/_output
        run: |
          mkdir -p "$OUTPUT_DIR"
          docker run --rm \
            -v "$(pwd)/private-build-plans.toml":/iosevka/private-build-plans.toml:ro \
            -v "$OUTPUT_DIR":/output \
            "$IMAGE" -c "
              bun run build -- ttf::${FONT_NAME} && \
              mkdir -p /output && \
              find dist/${FONT_NAME}/TTF -name '*.ttf' | while read -r f; do
                echo \"Patching \$f\"
                fontforge -script /font-patcher/font-patcher \"\$f\" --careful --makegroups 2 -s -q -c -l -out /output
              done
            "

      - name: Zip
        env:
          FONT_NAME: ${{ needs.build.outputs.font_name }}
          VERSION: ${{ needs.check.outputs.iosevka_version }}
          OUTPUT_DIR: ${{ github.workspace }}/_output
        run: |
          cd "$OUTPUT_DIR"
          zip -r "${FONT_NAME}-${VERSION}.zip" *.ttf

      - uses: actions/upload-artifact@v7
        with:
          name: font
          path: _output/${{ needs.build.outputs.font_name }}-${{ needs.check.outputs.iosevka_version }}.zip

  release:
    needs: [check, build, patch]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: font
          path: _output

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TRIGGER_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.iosevka_tag }}
          FONT_NAME: ${{ needs.build.outputs.font_name }}
          VERSION: ${{ needs.check.outputs.iosevka_version }}
          IOSEVKA_BASE_VERSION: ${{ needs.check.outputs.iosevka_base_version }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          NOTES_FILE="$(mktemp)"

          if [ -n "$CHANGELOG" ]; then
            printf '%s\n' "$CHANGELOG" > "$NOTES_FILE"
          else
            IOSEVKA_REL="https://github.com/be5invis/Iosevka/releases/tag/v${IOSEVKA_BASE_VERSION}"

            NF_TAG=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest" | jq -r .tag_name)
            NF_REL="https://github.com/ryanoasis/nerd-fonts/releases/tag/${NF_TAG}"

            {
              printf '[Iosevka v%s](%s)\n\n' "$IOSEVKA_BASE_VERSION" "$IOSEVKA_REL"
              printf '---\n\n'
              printf 'Patched with [Nerd Fonts %s](%s)\n' "$NF_TAG" "$NF_REL"
            } > "$NOTES_FILE"
          fi

          gh release create "$TAG" \
            "_output/${FONT_NAME}-${VERSION}.zip" \
            -R "${{ github.repository }}" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --latest
