name: Patch Iosevka Nerd Font

on:
  workflow_call:
    inputs:
      iosevka_version:
        required: true
        type: string
        description: 'Iosevka version number without v prefix'
      font_variant:
        required: true
        type: string
        description: 'Font variant name'

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl unzip fontforge
          curl -fsSL -o FontPatcher.zip \
            "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FontPatcher.zip"
          unzip -o FontPatcher.zip -d font-patcher

      - name: Download Iosevka
        run: |
          curl -fsSL -o fonts.zip \
            "https://github.com/be5invis/Iosevka/releases/download/v${{ inputs.iosevka_version }}/PkgTTF-${{ inputs.font_variant }}-${{ inputs.iosevka_version }}.zip"
          unzip -o fonts.zip -d input

      - name: Patch
        run: |
          mkdir -p output
          find input -name '*.ttf' | while read -r f; do
            echo "Patching $f"
            fontforge -script font-patcher/font-patcher "$f" \
              --careful \
              --makegroups 2 \
              -s \
              -q \
              -c \
              -l \
              -out output
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.font_variant }}-${{ inputs.iosevka_version }}
          path: output
          retention-days: 7
