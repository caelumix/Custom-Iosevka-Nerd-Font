name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
          fi
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IOSEVKA_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Generate cask
        run: |
          curl -fsSL -o font.zip \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/IosevkaTermSS04-nerd-font-${IOSEVKA_VERSION}.zip"
          SHA256=$(sha256sum font.zip | cut -d' ' -f1)
          unzip -o font.zip -d fonts

          mkdir -p Casks
          cat > "Casks/font-iosevka-term-ss04-nerd-font.rb" << RUBY
          cask "font-iosevka-term-ss04-nerd-font" do
            version "${IOSEVKA_VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/IosevkaTermSS04-nerd-font-#{version}.zip"
            name "Iosevka Term SS04 Nerd Font"
            homepage "https://github.com/${{ github.repository }}"

          $(find fonts -name '*.ttf' -printf '  font "%f"\n' | sort)

          end
          RUBY

      - name: Commit cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git diff --cached --quiet || git commit -m "chore: update cask to ${TAG}"
          git push
