name: Weekly Release

on:
  schedule:
    - cron: '0 9 * * 7'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_patch: ${{ steps.check.outputs.should_patch }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      iosevka_version: ${{ steps.check.outputs.iosevka_version }}
    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl jq

      - name: Check latest Iosevka version
        id: check
        run: |
          RELEASE_TAG=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/be5invis/Iosevka/releases/latest | jq -r .tag_name)
          IOSEVKA_VERSION="${RELEASE_TAG#v}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "iosevka_version=$IOSEVKA_VERSION" >> "$GITHUB_OUTPUT"

          if curl -fsSL -o /dev/null \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG"; then
            echo "$RELEASE_TAG already released, skipping"
            echo "should_patch=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_patch=true" >> "$GITHUB_OUTPUT"
          fi

  patch:
    needs: check
    if: needs.check.outputs.should_patch == 'true'
    uses: ./.github/workflows/patch-font.yml
    with:
      iosevka_version: ${{ needs.check.outputs.iosevka_version }}
      font_variant: IosevkaTermSS04

  release:
    needs: [check, patch]
    if: needs.check.outputs.should_patch == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl zip

      - uses: actions/download-artifact@v4
        with:
          name: IosevkaTermSS04-${{ needs.check.outputs.iosevka_version }}
          path: fonts

      - name: Zip fonts
        run: |
          cd fonts
          zip -r ../IosevkaTermSS04-nerd-font-${{ needs.check.outputs.iosevka_version }}.zip .

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check.outputs.release_tag }}
          name: ${{ needs.check.outputs.release_tag }}
          artifacts: IosevkaTermSS04-nerd-font-${{ needs.check.outputs.iosevka_version }}.zip
          generateReleaseNotes: true
